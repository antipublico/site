
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página en desarrollo</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Evita scroll */
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 5vw; /* Se ajusta según el ancho de la pantalla */
            line-height: 1.2;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 8vw; /* Más grande en móviles */
            }
        }
    </style>
</head>
<body>
    <h1>ANTIPUBLIC ESTA EN DESARROLLO HASTA QUE TOMÁS ME PRESTE 20 LUCAS</h1>
</body>
</html>
